<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Notifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">⚡</div>
        <div>
          <h1 class="header-title">Event Notifier</h1>
          <p class="header-sub">Tech Events near you</p>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh now">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
        </svg>
      </button>
    </header>

    <!-- Filter Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-tag="all">All</button>
      <button class="tab" data-tag="hackathon">Hackathon</button>
      <button class="tab" data-tag="ai">AI</button>
      <button class="tab" data-tag="meetup">Meetup</button>
      <button class="tab" data-tag="startup">Startup</button>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar">
      <span id="statusText">Loading events...</span>
      <span id="eventCount" class="count-badge"></span>
    </div>

    <!-- Event List -->
    <div class="events-list" id="eventsList">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

    <!-- Subscribe -->
    <div class="subscribe-section">
      <form id="subscribeForm">
        <div class="subscribe-row">
          <input
            type="email"
            id="emailInput"
            class="email-input"
            placeholder="your@email.com"
            required
          />
          <input
            type="text"
            id="cityInput"
            class="city-input"
            placeholder="City (e.g. Bangalore)"
          />
        </div>
        <button type="submit" class="subscribe-btn" id="subscribeBtn">
          Get Alerts
        </button>
      </form>
      <p class="subscribe-msg" id="subscribeMsg"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
